name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Configure NuGet auth
        run: >
          dotnet nuget update source github
          --username ${{ github.actor }}
          --password ${{ secrets.KUESTENLOGIK_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --configfile nuget.config

      - name: Determine version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "VERSION=0.1.0-ci.${COMMIT_COUNT}.${SHORT_SHA}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore Akka.Streams.Surgewave.slnx

      - name: Build
        run: dotnet build Akka.Streams.Surgewave.slnx -c Release --no-restore -p:Version=$VERSION

      - name: Test
        run: dotnet test Akka.Streams.Surgewave.slnx -c Release --no-build -v normal

      - name: Pack NuGet
        run: dotnet pack Akka.Streams.Surgewave.slnx -c Release --no-build -o artifacts/packages -p:Version=$VERSION

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://nuget.pkg.github.com/Kuestenlogik/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
